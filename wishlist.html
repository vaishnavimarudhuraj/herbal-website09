<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wishlist — HerbalNature</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/cart.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="header" id="header">
        <div class="container">
            <a href="index.html" class="logo"><i data-lucide="leaf"></i><span>HerbalNature</span></a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a><a href="products.html">Products</a><a
                    href="community.html">Community</a><a href="order-tracking.html">Track Order</a><a href="login.html"
                    class="nav-auth-link">Login</a><a href="admin.html" class="nav-admin-link"
                    style="display:none;">Admin</a>
            </nav>
            <div class="nav-actions">
                <button class="theme-toggle"><i data-lucide="moon"></i></button>
                <a href="wishlist.html" class="btn-icon" style="color:var(--primary);border-color:var(--primary)"><i
                        data-lucide="heart"></i></a>
                <a href="cart.html" class="btn-icon nav-cart"><i data-lucide="shopping-bag"></i><span class="cart-count"
                        style="display:none;">0</span></a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <main class="wishlist-page">
        <div class="container">
            <div class="page-header">
                <h1>My <span class="text-gradient">Wishlist</span></h1>
            </div>
            <div class="wishlist-grid" id="wishlistGrid"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 HerbalNature.</p>
            </div>
        </div>
    </footer>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderWishlist();
        });

        function renderWishlist() {
            const grid = document.getElementById('wishlistGrid');
            const list = getWishlist();
            if (!list.length) {
                grid.innerHTML = `<div class="empty-state"><div class="icon">💚</div><h2>Your wishlist is empty</h2><p>Save products you love for later</p><a href="products.html" class="btn btn-primary">Browse Products</a></div>`;
                return;
            }
            grid.innerHTML = list.map(id => {
                const p = PRODUCTS.find(x => x.id === id);
                if (!p) return '';
                return `<div class="product-card">
          <div class="product-card-image"><span style="font-size:5rem;z-index:1">${p.image}</span></div>
          <div class="product-card-body">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title"><a href="product-detail.html?id=${p.id}">${p.name}</a></h3>
            <div class="product-card-price"><span class="current">${formatPrice(p.price)}</span><span class="original">${formatPrice(p.originalPrice)}</span></div>
            <div class="product-card-footer">
              <button class="btn btn-primary btn-sm" onclick="addToCart(${p.id})"><i data-lucide="shopping-bag"></i> Add to Cart</button>
              <button class="btn btn-secondary btn-sm" onclick="toggleWishlist(${p.id}); renderWishlist();"><i data-lucide="x"></i> Remove</button>
            </div>
          </div>
        </div>`;
            }).join('');
            lucide.createIcons();
        }
    </script>
</body>

</html>

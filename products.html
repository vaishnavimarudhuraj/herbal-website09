<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products — HerbalNature</title>
    <meta name="description"
        content="Browse our collection of organic herbal products. Filter by category, price, and rating.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/products.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="header" id="header">
        <div class="container">
            <a href="index.html" class="logo"><i data-lucide="leaf"></i><span>HerbalNature</span></a>
            <nav class="nav-links" id="navLinks">
                <a href="index.html">Home</a>
                <a href="products.html" class="active">Products</a>
                <a href="community.html">Community</a>
                <a href="order-tracking.html">Track Order</a>
                <a href="login.html" class="nav-auth-link">Login</a>
                <a href="admin.html" class="nav-admin-link" style="display:none;">Admin</a>
            </nav>
            <div class="nav-actions">
                <button class="theme-toggle" aria-label="Toggle theme"><i data-lucide="moon"></i></button>
                <a href="wishlist.html" class="btn-icon"><i data-lucide="heart"></i></a>
                <a href="cart.html" class="btn-icon nav-cart"><i data-lucide="shopping-bag"></i><span class="cart-count"
                        style="display:none;">0</span></a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <main class="products-page">
        <div class="container">
            <div class="products-header reveal">
                <h1>Our <span class="text-gradient">Products</span></h1>
                <p class="section-subtitle" style="margin-bottom:0">Discover nature's finest herbal solutions</p>
            </div>

            <div class="search-container reveal">
                <div class="search-input-wrapper">
                    <i data-lucide="search"></i>
                    <input type="text" id="searchInput" placeholder="Search herbs, teas, oils...">
                </div>
                <div class="search-suggestions" id="searchSuggestions"></div>
            </div>

            <button class="btn btn-secondary filter-toggle-btn" id="filterToggle"><i
                    data-lucide="sliders-horizontal"></i> Filters</button>

            <div class="products-layout">
                <aside class="filters-sidebar" id="filtersSidebar">
                    <button class="btn btn-sm btn-secondary filter-close-btn" id="filterClose" style="display:none;"><i
                            data-lucide="x"></i> Close</button>
                    <div class="filter-group">
                        <h3>Categories</h3>
                        <div id="categoryFilters"></div>
                    </div>
                    <div class="filter-group">
                        <h3>Price Range</h3>
                        <div class="price-range">
                            <input type="number" id="priceMin" placeholder="Min" min="0" value="0">
                            <span>—</span>
                            <input type="number" id="priceMax" placeholder="Max" min="0" value="100">
                        </div>
                    </div>
                    <div class="filter-group">
                        <h3>Rating</h3>
                        <label class="filter-option"><input type="radio" name="rating" value="0" checked> All
                            Ratings</label>
                        <label class="filter-option"><input type="radio" name="rating" value="4.5"> 4.5 & above</label>
                        <label class="filter-option"><input type="radio" name="rating" value="4"> 4.0 & above</label>
                    </div>
                    <div class="filter-actions">
                        <button class="btn btn-primary btn-sm" onclick="applyFilters()">Apply</button>
                        <button class="btn btn-secondary btn-sm" onclick="resetFilters()">Reset</button>
                    </div>
                </aside>

                <div>
                    <div class="products-controls">
                        <div class="products-count" id="productsCount">Showing <strong>0</strong> products</div>
                        <select class="sort-select" id="sortSelect" onchange="applyFilters()">
                            <option value="popular">Most Popular</option>
                            <option value="price-low">Price: Low to High</option>
                            <option value="price-high">Price: High to Low</option>
                            <option value="rating">Highest Rated</option>
                            <option value="newest">Newest</option>
                        </select>
                    </div>
                    <div class="products-grid" id="productsGrid"></div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 HerbalNature. All rights reserved.</p>
                <p>Made with 🌿 for a healthier world</p>
            </div>
        </div>
    </footer>

    <script src="js/app.js"></script>
    <script src="js/products.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmer Profile — HerbalNature</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/community.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="header" id="header">
        <div class="container">
            <a href="index.html" class="logo"><i data-lucide="leaf"></i><span>HerbalNature</span></a>
            <nav class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="products.html">Products</a><a
                    href="community.html">Community</a><a href="login.html" class="nav-auth-link">Login</a></nav>
            <div class="nav-actions">
                <button class="theme-toggle"><i data-lucide="moon"></i></button>
                <a href="cart.html" class="btn-icon nav-cart"><i data-lucide="shopping-bag"></i><span class="cart-count"
                        style="display:none;">0</span></a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <main class="profile-page">
        <div class="container">
            <div class="profile-header" id="profileHeader"></div>
            <h2 style="font-family:var(--font-heading);margin:var(--space-2xl) 0 var(--space-xl)">Products by this
                Farmer</h2>
            <div class="profile-products featured-grid" id="farmerProducts"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 HerbalNature.</p>
            </div>
        </div>
    </footer>
    <script src="js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const id = parseInt(new URLSearchParams(window.location.search).get('id'));
            const f = FARMERS.find(x => x.id === id);
            if (!f) { document.getElementById('profileHeader').innerHTML = '<h1>Farmer not found</h1><p><a href="community.html">Back to community</a></p>'; return; }

            document.title = f.name + ' — HerbalNature';
            document.getElementById('profileHeader').innerHTML = `
        <div class="avatar">${f.avatar}</div>
        <h1>${f.name}</h1>
        <div class="location"><i data-lucide="map-pin" style="width:16px;height:16px;display:inline"></i> ${f.location}</div>
        <div style="margin:var(--space-md) 0"><span class="badge badge-primary">${f.specialty}</span></div>
        <p class="bio">${f.bio}</p>
        <div class="farmer-stats" style="max-width:400px;margin:var(--space-xl) auto 0">
          <div class="stat"><span class="value">${f.products}</span><span class="label">Products</span></div>
          <div class="stat"><span class="value">${f.rating}</span><span class="label">Rating</span></div>
          <div class="stat"><span class="value">${f.experience}</span><span class="label">Experience</span></div>
          <div class="stat"><span class="value">${f.joined}</span><span class="label">Joined</span></div>
        </div>`;

            // Show some products
            const prods = PRODUCTS.slice(0, f.products > 6 ? 6 : f.products);
            const grid = document.getElementById('farmerProducts');
            prods.forEach(p => {
                grid.innerHTML += `<div class="product-card">
          <div class="product-card-image"><span style="font-size:5rem;z-index:1">${p.image}</span></div>
          <div class="product-card-body">
            <div class="product-card-category">${p.category}</div>
            <h3 class="product-card-title">${p.name}</h3>
            <div class="product-card-price"><span class="current">${formatPrice(p.price)}</span></div>
            <div class="product-card-footer"><button class="btn btn-primary btn-sm" onclick="addToCart(${p.id})">Add to Cart</button></div>
          </div></div>`;
            });
            lucide.createIcons();
        });
    </script>
</body>

</html>

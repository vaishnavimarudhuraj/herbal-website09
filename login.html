<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login / Sign Up — HerbalNature</title>
    <meta name="description" content="Sign in or create an account to access your herbal wellness journey.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/auth.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <main class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-logo">
                    <a href="index.html" class="logo"><span class="text-gradient">🌿 HerbalNature</span></a>
                    <p>Your gateway to natural wellness</p>
                </div>

                <div class="auth-tabs">
                    <button class="auth-tab active" onclick="switchTab('login')">Sign In</button>
                    <button class="auth-tab" onclick="switchTab('signup')">Sign Up</button>
                </div>

                <!-- Login Form -->
                <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="you@example.com" required>
                        <span class="error-msg">Please enter a valid email</span>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required minlength="6">
                        <span class="error-msg">Password must be at least 6 characters</span>
                    </div>
                    <div class="form-extras">
                        <label><input type="checkbox"> Remember me</label>
                        <a href="#">Forgot password?</a>
                    </div>
                    <button type="submit" class="btn btn-primary auth-submit">Sign In</button>
                    <div class="auth-divider">or continue with</div>
                    <div class="social-login">
                        <button type="button" class="social-btn"
                            onclick="showToast('Social login coming soon','info')">🔵 Google</button>
                        <button type="button" class="social-btn"
                            onclick="showToast('Social login coming soon','info')">⚫ Apple</button>
                    </div>
                </form>

                <!-- Signup Form -->
                <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
                    <div class="form-row">
                        <div class="input-group">
                            <label>First Name</label>
                            <input type="text" id="signupFirst" placeholder="John" required>
                        </div>
                        <div class="input-group">
                            <label>Last Name</label>
                            <input type="text" id="signupLast" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="input-group">
                        <label>Email</label>
                        <input type="email" id="signupEmail" placeholder="you@example.com" required>
                    </div>
                    <div class="input-group">
                        <label>Password</label>
                        <input type="password" id="signupPassword" placeholder="Min 6 characters" required
                            minlength="6">
                    </div>
                    <div class="input-group">
                        <label>Select Role</label>
                        <div class="role-selector">
                            <div class="role-option selected" onclick="selectRole('customer', this)"><span
                                    class="icon">🛒</span>Customer</div>
                            <div class="role-option" onclick="selectRole('farmer', this)"><span
                                    class="icon">👨‍🌾</span>Farmer</div>
                            <div class="role-option" onclick="selectRole('admin', this)"><span
                                    class="icon">👑</span>Admin</div>
                        </div>
                    </div>
                    <div class="input-group auth-key-group" id="authKeyGroup">
                        <label>Authentication Key</label>
                        <input type="text" id="authKey" placeholder="Enter your auth key">
                        <span class="error-msg">Invalid authentication key</span>
                    </div>
                    <button type="submit" class="btn btn-primary auth-submit">Create Account</button>
                </form>
            </div>
            <div class="auth-footer">
                <a href="index.html">← Back to Home</a>
            </div>
        </div>
    </main>

    <script src="js/app.js"></script>
    <script src="js/auth.js"></script>
</body>

</html>

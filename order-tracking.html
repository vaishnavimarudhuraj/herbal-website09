<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Track Order — HerbalNature</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/checkout.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .tracking-page {
            padding-top: calc(var(--header-height) + var(--space-2xl));
            min-height: 100vh
        }

        .track-search {
            max-width: 500px;
            margin: 0 auto var(--space-3xl);
            display: flex;
            gap: var(--space-sm)
        }

        .track-search input {
            flex: 1;
            border-radius: var(--radius-full);
            padding: 0.85rem 1.5rem
        }

        .track-result {
            max-width: 700px;
            margin: 0 auto;
            animation: fadeInUp 0.5s ease
        }

        .track-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: var(--space-2xl);
            margin-bottom: var(--space-xl)
        }

        .track-card h2 {
            font-family: var(--font-heading);
            font-size: var(--fs-xl);
            margin-bottom: var(--space-lg);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: var(--space-sm)
        }

        .timeline {
            position: relative;
            padding-left: 40px
        }

        .timeline::before {
            content: '';
            position: absolute;
            left: 15px;
            top: 0;
            bottom: 0;
            width: 3px;
            background: var(--border-color);
            border-radius: 2px
        }

        .timeline-step {
            position: relative;
            padding-bottom: var(--space-xl);
            padding-left: var(--space-xl)
        }

        .timeline-step:last-child {
            padding-bottom: 0
        }

        .timeline-dot {
            position: absolute;
            left: -33px;
            top: 2px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--bg-secondary);
            border: 3px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            z-index: 1
        }

        .timeline-step.completed .timeline-dot {
            background: var(--success);
            border-color: var(--success);
            color: #fff
        }

        .timeline-step.active .timeline-dot {
            background: var(--primary);
            border-color: var(--primary);
            color: #fff;
            box-shadow: 0 0 0 6px var(--primary-glow);
            animation: pulse-badge 2s infinite
        }

        .timeline-step h4 {
            font-size: var(--fs-base);
            margin-bottom: 2px
        }

        .timeline-step p {
            font-size: var(--fs-sm);
            color: var(--text-muted)
        }

        .order-items-list {
            margin-top: var(--space-lg);
            border-top: 1px solid var(--border-light);
            padding-top: var(--space-lg)
        }

        .order-items-list h3 {
            font-size: var(--fs-base);
            margin-bottom: var(--space-md)
        }

        .order-item-row {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            padding: var(--space-sm) 0;
            font-size: var(--fs-sm)
        }

        .order-item-row .emoji {
            font-size: 1.5rem
        }

        .order-item-row .name {
            flex: 1
        }

        .order-item-row .price {
            font-weight: 700;
            color: var(--primary)
        }
    </style>
</head>

<body>
    <header class="header" id="header">
        <div class="container">
            <a href="index.html" class="logo"><i data-lucide="leaf"></i><span>HerbalNature</span></a>
            <nav class="nav-links" id="navLinks"><a href="index.html">Home</a><a href="products.html">Products</a><a
                    href="community.html">Community</a><a href="order-tracking.html" class="active">Track Order</a><a
                    href="login.html" class="nav-auth-link">Login</a></nav>
            <div class="nav-actions">
                <button class="theme-toggle"><i data-lucide="moon"></i></button>
                <a href="cart.html" class="btn-icon nav-cart"><i data-lucide="shopping-bag"></i><span class="cart-count"
                        style="display:none;">0</span></a>
                <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
            </div>
        </div>
    </header>

    <main class="tracking-page">
        <div class="container">
            <div class="page-header" style="text-align:center;margin-bottom:var(--space-2xl)">
                <h1>Track Your <span class="text-gradient">Order</span></h1>
                <p style="color:var(--text-muted)">Enter your order ID to track status</p>
            </div>
            <div class="track-search">
                <input type="text" id="trackInput" placeholder="Enter Order ID (e.g., HRB-XXXXX)">
                <button class="btn btn-primary" onclick="trackOrder()"><i data-lucide="search"></i> Track</button>
            </div>
            <div id="trackResult"></div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 HerbalNature.</p>
            </div>
        </div>
    </footer>
    <script src="js/app.js"></script>
    <script>
        function trackOrder() {
            const id = document.getElementById('trackInput').value.trim();
            if (!id) { showToast('Please enter an order ID', 'warning'); return; }
            const orders = getOrders();
            const order = orders.find(o => o.id === id);
            const result = document.getElementById('trackResult');

            if (!order) {
                result.innerHTML = `<div class="track-result"><div class="track-card" style="text-align:center"><div style="font-size:4rem;margin-bottom:var(--space-md);opacity:0.3">📦</div><h2 style="justify-content:center">Order Not Found</h2><p style="color:var(--text-muted)">Please check the order ID and try again. Order IDs start with "HRB-".</p></div></div>`;
                return;
            }

            const statuses = [
                { key: 'confirmed', label: 'Order Confirmed', desc: 'Your order has been placed successfully', icon: '✓' },
                { key: 'processing', label: 'Processing', desc: 'We are preparing your herbal products', icon: '⚙' },
                { key: 'shipped', label: 'Shipped', desc: 'Your package is on its way', icon: '📦' },
                { key: 'delivered', label: 'Delivered', desc: 'Enjoy your herbal products!', icon: '✓' }
            ];

            const currentIdx = statuses.findIndex(s => s.key === order.status);
            const date = new Date(order.date).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

            result.innerHTML = `<div class="track-result"><div class="track-card">
        <h2>${order.id} <span class="badge badge-success">${order.status.toUpperCase()}</span></h2>
        <p style="color:var(--text-muted);margin-bottom:var(--space-xl)">Ordered on ${date} • Payment: ${order.payment}</p>
        <div class="timeline">${statuses.map((s, i) => {
                const cls = i < currentIdx ? 'completed' : i === currentIdx ? 'active' : '';
                return `<div class="timeline-step ${cls}"><div class="timeline-dot">${s.icon}</div><h4>${s.label}</h4><p>${s.desc}</p></div>`;
            }).join('')}</div>
        <div class="order-items-list"><h3>Order Items</h3>${order.items.map(i => `<div class="order-item-row"><span class="emoji">${i.image || '📦'}</span><span class="name">${i.name} ×${i.qty}</span><span class="price">${formatPrice(i.price * i.qty)}</span></div>`).join('')}</div>
        <div style="margin-top:var(--space-lg);padding-top:var(--space-lg);border-top:1px solid var(--border-light);display:flex;justify-content:space-between;font-weight:700"><span>Total</span><span style="color:var(--primary);font-size:var(--fs-xl)">${formatPrice(order.total)}</span></div>
      </div></div>`;
            lucide.createIcons();
        }

        // Auto-fill from URL
        document.addEventListener('DOMContentLoaded', () => {
            const id = new URLSearchParams(window.location.search).get('id');
            if (id) { document.getElementById('trackInput').value = id; trackOrder(); }
        });
    </script>
</body>

</html>
